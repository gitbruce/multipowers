name: Claude Octopus

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run (init, plan, discover, define, develop, deliver, debate, embrace, review)'
        required: true
        default: 'plan'
        type: choice
        options:
          - init
          - plan
          - discover
          - define
          - develop
          - deliver
          - debate
          - embrace
          - review
      prompt:
        description: 'Prompt for octo command'
        required: false
        type: string

jobs:
  run-octo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go build -o bin/octo ./cmd/octo
      - name: Execute command
        run: |
          if [ "${{ inputs.command }}" = "init" ]; then
            ./bin/octo init --dir "$PWD" --json
          else
            ./bin/octo "${{ inputs.command }}" --dir "$PWD" --prompt "${{ inputs.prompt }}" --json
          fi
      - name: Validate strict no-shell
        run: ./bin/octo validate --strict-no-shell --dir "$PWD" --json
