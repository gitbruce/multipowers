name: upstream-sync-automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  dry-run-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: ./scripts/sync-all.sh -dry-run
