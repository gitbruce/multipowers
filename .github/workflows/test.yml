name: Test Suite

on:
  push:
    branches: [ main, develop, go, go-no-shell-runtime ]
  pull_request:
    branches: [ main, go ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go version
      - run: go test ./...
      - run: go vet ./...
      - run: go run ./cmd/octo-devx --action suite --suite unit
      - run: go run ./cmd/octo validate --strict-no-shell --dir . --json
