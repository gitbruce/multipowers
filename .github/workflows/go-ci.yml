name: go-ci

on:
  push:
    branches: [ "go" ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go version
      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...
      - run: ./scripts/check-go-file-length.sh
