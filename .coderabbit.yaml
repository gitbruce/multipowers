language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "cmd/**"
    - "internal/**"
    - "config/**"
    - ".claude-plugin/**"
    - "docs/plans/**"
    - "docs/*.md"

chat:
  auto_reply: false
